<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230d0f14'/><rect x='3' y='3' width='26' height='26' rx='5' fill='none' stroke='%234f8fff' stroke-width='2'/><text x='16' y='22' font-family='monospace' font-size='16' font-weight='bold' fill='%234f8fff' text-anchor='middle'>QA</text></svg>">
  <title>MY QA Tools</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --surface3: #232840;
      --border: #2a3050;
      --border2: #353d60;
      --accent: #4f8fff;
      --accent2: #6b4fff;
      --success: #2ecc71;
      --warn: #f39c12;
      --error: #e74c3c;
      --text: #e8ecf5;
      --text2: #8891b0;
      --text3: #555e80;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    #root {
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .topbar-logo::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent);
    }
    .topbar-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      flex-wrap: wrap;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text3);
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .status-dot.error { background: var(--error); }

    /* MAIN LAYOUT — занимает всё оставшееся пространство */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* SIDEBAR */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 10px 8px;
    }
    .sidebar-section { margin-bottom: 6px; }
    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      padding: 8px 10px 4px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12.5px;
      color: var(--text2);
      transition: all 0.12s;
      border: 1px solid transparent;
      background: none;
      width: 100%;
      text-align: left;
      white-space: nowrap;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active {
      background: linear-gradient(135deg, rgba(79,143,255,0.15), rgba(107,79,255,0.1));
      color: var(--accent);
      border-color: rgba(79,143,255,0.2);
    }
    .sidebar-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto;
      background: var(--surface3);
      color: var(--text3);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 8px;
      font-family: var(--mono);
    }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      min-width: 0;
    }

    /* PANEL — прокручивается вертикально */
    .panel {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px;
      min-height: 0;
    }

    .panel-header {
      margin-bottom: 24px;
    }
    .panel-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .panel-sub {
      font-size: 13px;
      color: var(--text3);
    }

    /* FORMS */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.02em;
    }
    .form-label span { color: var(--error); margin-left: 2px; }
    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      font-family: var(--sans);
      color: var(--text);
      transition: border-color 0.15s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(79,143,255,0.12);
    }
    .form-input::placeholder { color: var(--text3); }
    select.form-input { cursor: pointer; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 15px rgba(79,143,255,0.25);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79,143,255,0.35);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface3); color: var(--text); }
    .btn-danger {
      background: rgba(231,76,60,0.15);
      color: var(--error);
      border: 1px solid rgba(231,76,60,0.3);
    }
    .btn-danger:hover { background: rgba(231,76,60,0.25); }
    .btn-warn {
      background: rgba(243,156,18,0.15);
      color: var(--warn);
      border: 1px solid rgba(243,156,18,0.3);
    }
    .btn-warn:hover { background: rgba(243,156,18,0.25); }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* SPINNER */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LOG PANE */
    .log-pane {
      height: 220px;`r`n      min-height: 140px;`r`n      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .log-resizer {
      height: 8px;
      cursor: ns-resize;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(79,143,255,0.12), transparent);
      flex-shrink: 0;
    }
    .log-resizer:hover { background: linear-gradient(180deg, rgba(79,143,255,0.2), transparent); }
    .log-header {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
    }
    .log-count {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--surface3);
      color: var(--text3);
      padding: 1px 6px;
      border-radius: 4px;
    }
    .log-clear {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .log-clear:hover { background: var(--surface2); color: var(--text2); }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .log-entry {
      display: flex;
      gap: 12px;
      padding: 2px 0;
      line-height: 1.6;
    }
    .log-ts { color: var(--text3); flex-shrink: 0; font-size: 11px; }
    .log-msg { }
    .log-entry.info .log-msg { color: var(--text2); }
    .log-entry.success .log-msg { color: var(--success); }
    .log-entry.warn .log-msg { color: var(--warn); }
    .log-entry.error .log-msg { color: var(--error); }
    .log-entry.debug .log-msg { color: var(--text3); }

    /* RBAC TABLE */
    .rbac-wrap {
      overflow-x: auto;
    }
    .rbac-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .rbac-table th {
      background: var(--surface2);
      color: var(--text2);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 10px 12px;
      text-align: left;
      border: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      white-space: nowrap;
    }
    .rbac-table td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      color: var(--text2);
      vertical-align: top;
    }
    .rbac-table tr:hover td { background: rgba(79,143,255,0.04); }
    .rbac-resource {
      font-weight: 600;
      color: var(--text);
    }
    .rbac-action {
      color: var(--text2);
      padding-left: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-yes { background: rgba(46,204,113,0.15); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
    .badge-no { background: rgba(85,94,128,0.2); color: var(--text3); border: 1px solid var(--border); }
    .badge-partial { background: rgba(243,156,18,0.12); color: var(--warn); border: 1px solid rgba(243,156,18,0.3); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar .form-input {
      width: auto;
      flex: 1;
      min-width: 180px;
    }

    /* SETTINGS */
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      margin-bottom: 20px;
    }
    .settings-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title-icon { font-size: 16px; }

    /* PILLS */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .pill-info { background: rgba(79,143,255,0.12); color: var(--accent); border: 1px solid rgba(79,143,255,0.25); }
    .pill-success { background: rgba(46,204,113,0.12); color: var(--success); border: 1px solid rgba(46,204,113,0.25); }
    .pill-error { background: rgba(231,76,60,0.12); color: var(--error); border: 1px solid rgba(231,76,60,0.25); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ENV switcher */
    .env-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      height: 36px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .env-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .env-pill {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      transition: all 0.12s;
      font-family: var(--mono);
    }
    .env-pill:hover { border-color: var(--border2); color: var(--text2); }
    .env-pill.active { background: rgba(79,143,255,0.15); border-color: rgba(79,143,255,0.4); color: var(--accent); }
    .env-pill.dev.active { background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.4); color: var(--success); }
    .env-pill.stage.active { background: rgba(243,156,18,0.1); border-color: rgba(243,156,18,0.4); color: var(--warn); }
    .env-pill.prod.active { background: rgba(231,76,60,0.1); border-color: rgba(231,76,60,0.4); color: var(--error); }
    .env-add { background: none; border: 1px dashed var(--border); color: var(--text3); border-radius: 20px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
    .env-add:hover { border-color: var(--accent); color: var(--accent); }

    /* DATA GEN */
    .gen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .gen-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .gen-card-header {
      background: var(--surface2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .gen-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gen-card-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .gen-field {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .gen-field-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
    }
    .gen-field-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gen-field-val.editable {
      cursor: text;
      outline: none;
    }
    .gen-field-val.editable:focus {
      border-color: var(--accent);
      color: var(--text);
    }
    .gen-copy {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.1s;
    }
    .gen-copy:hover { background: var(--surface3); color: var(--text); }
    .gen-copy.copied { color: var(--success); }

    .gen-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .use-btn {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(79,143,255,0.3);
      background: rgba(79,143,255,0.1);
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.12s;
    }
    .use-btn:hover { background: rgba(79,143,255,0.2); }

    .valid-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .valid-badge.ok { background: rgba(46,204,113,0.12); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
    .valid-badge.err { background: rgba(231,76,60,0.12); color: var(--error); border: 1px solid rgba(231,76,60,0.3); }

    .gen-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-badge {
      font-size: 10px;
      background: rgba(79,143,255,0.2);
      color: var(--accent);
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 4px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════
// DATA GENERATOR (ported from Postman pre-request script)
// ═══════════════════════════════════════════════════════════════
function r(m,M){return Math.floor(Math.random()*(M-m+1))+m;}
function p(n,w){return n.toString().padStart(w,"0");}
function g(a){return a[r(0,a.length-1)];}
function translit(str){const map={"а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ё":"e","ж":"zh","з":"z","и":"i","й":"y","к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r","с":"s","т":"t","у":"u","ф":"f","х":"kh","ц":"ts","ч":"ch","ш":"sh","щ":"shch","ъ":"","ы":"y","ь":"","э":"e","ю":"yu","я":"ya"};return String(str).toLowerCase().split("").map(c=>map[c]??c).join("");}
function dateIso(d){return `${d.getFullYear()}-${p(d.getMonth()+1,2)}-${p(d.getDate(),2)}`;}
function dateFormat(d){return `${p(d.getDate(),2)}.${p(d.getMonth()+1,2)}.${d.getFullYear()}`;}
function futureDateIso(da){const d=new Date();d.setDate(d.getDate()+da);return d.toISOString();}
function pastDateIso(da){const d=new Date();d.setDate(d.getDate()-da);return d.toISOString();}
function validSnils(sn){if(!/^\d{11}$/.test(sn))return false;const n=sn.slice(0,9).split("").map(Number);const ctrl=parseInt(sn.slice(9),10);let sum=n.reduce((s,x,i)=>s+x*(9-i),0);if(sum<100)return sum===ctrl;if(sum===100)return ctrl===0;return sum%101%100===ctrl;}
function validInn12(inn){if(!/^\d{12}$/.test(inn))return false;const d=inn.split("").map(Number);const c1=(d.slice(0,10).reduce((s,x,i)=>s+x*[7,2,4,10,3,5,9,4,6,8][i],0)%11)%10;const c2=(d.slice(0,11).reduce((s,x,i)=>s+x*[3,7,2,4,10,3,5,9,4,6,8][i],0)%11)%10;return c1===d[10]&&c2===d[11];}
function validInn10(inn){if(!/^\d{10}$/.test(inn))return false;const d=inn.split("").map(Number);const c=(d.slice(0,9).reduce((s,x,i)=>s+x*[2,4,10,3,5,9,4,6,8][i],0)%11)%10;return c===d[9];}
function validOgrn(ogrn){if(!/^\d{13}$/.test(ogrn))return false;const n=BigInt(ogrn.slice(0,12));return Number(n%11n%10n)===+ogrn[12];}
function validKpp(kpp){return /^\d{9}$/.test(kpp);}
function genSnils(){let n="";for(let i=0;i<9;i++)n+=r(0,9);let sum=0;for(let i=0;i<9;i++)sum+=+n[i]*(9-i);let c=sum%101;if(c===100)c=0;return n+c.toString().padStart(2,"0");}
function genInn12(){function m(x){return x%11%10}const a=[r(1,9)];for(let i=0;i<9;i++)a.push(r(0,9));const w1=[7,2,4,10,3,5,9,4,6,8];let s1=0;for(let i=0;i<10;i++)s1+=w1[i]*a[i];a.push(m(s1));const w2=[3,7,2,4,10,3,5,9,4,6,8];let s2=0;for(let i=0;i<11;i++)s2+=w2[i]*a[i];a.push(m(s2));return a.join``;}

function inn10R(reg){const d=[+reg[0],+reg[1],r(0,9),r(0,9)];for(let i=0;i<5;i++)d.push(r(0,9));const w=[2,4,10,3,5,9,4,6,8];const c=(d.reduce((s,x,i)=>s+x*w[i],0)%11)%10;d.push(c);return d.join("");}
function kppR(reg){return reg+p(r(0,99),2)+p(r(1,99),2)+p(r(1,999),3);}
function ogrn13(yr,reg){let b="1"+p(yr%100,2)+reg+p(r(0,9999999),7);return b+(BigInt(b)%11n%10n).toString();}
function ogrnip15(yr,reg){let b="3"+p(yr%100,2)+reg+p(r(0,999999999),9);return b+(BigInt(b)%13n%10n).toString();}
function regDateFromOgrn(ogrn){const yy=parseInt(String(ogrn).slice(1,3),10);const year=(yy<=(new Date().getFullYear()%100)?2000+yy:1900+yy);const d=new Date(year,r(0,11),r(1,28));return dateIso(d);}

function orgTypeUsesInn12(type){
  return type==="individual_entrepreneur"||type==="farming"||type==="self_employed";
}
function orgTypeSupportsKpp(type){
  return type==="juristic"||type==="separate_juristic";
}
function orgTypeSupportsOgrn(type){
  return type==="juristic"||type==="individual_entrepreneur"||type==="farming";
}
function getActiveOrgNamingConfig(){
  try{
    const envs = normalizeEnvList(lsGet(LS_ENVS, DEFAULT_ENVS));
    const activeId = localStorage.getItem(LS_ENV_ID) || 'dev';
    const active = normalizeEnvConfig(envs.find(e=>e.id===activeId) || envs[0] || createDefaultEnv('dev','dev'));
    const brands = String(active.orgNameBrands || '').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    return {
      templates: normalizeOrgNameTemplates(active.orgNameTemplates),
      brands: brands.length ? brands : DEFAULT_ORG_NAME_BRANDS,
    };
  }catch{
    return {
      templates: {...DEFAULT_ORG_NAME_TEMPLATES},
      brands: [...DEFAULT_ORG_NAME_BRANDS],
    };
  }
}

function renderOrgNameTemplate(template, ctx){
  const src = String(template || '{brand}');
  return src
    .replaceAll('{brand}', ctx.brand || '')
    .replaceAll('{lastName}', ctx.lastName || '')
    .replaceAll('{firstName}', ctx.firstName || '')
    .replaceAll('{middleName}', ctx.middleName || '');
}

function buildOrgName(type){
  const cfg = getActiveOrgNamingConfig();
  const person = generatePerson();
  const brand = g(cfg.brands);
  const tpl = cfg.templates[type] || cfg.templates.not_defined || '{brand}';
  const raw = renderOrgNameTemplate(tpl, {
    brand,
    lastName: person.lastName,
    firstName: person.firstName,
    middleName: person.middleName,
  });
  const fullName = String(raw || '').replace(/\s+/g, ' ').trim() || ('ООО "' + brand + '"');
  return { fullName, shortName: makeShortName(fullName) };
}

function generateOrg(type){
  const positions=Array.from({length:10},(_,i)=>`Position ${i+1}`);
  const departments=Array.from({length:10},(_,i)=>`Department ${i+1}`);
  const names=buildOrgName(type);
  const region=g(REGIONS);
  const curYear=new Date().getFullYear();
  const year=r(curYear-20,curYear);
  const usesInn12=orgTypeUsesInn12(type);
  const supportsKpp=orgTypeSupportsKpp(type);
  const supportsOgrn=orgTypeSupportsOgrn(type);
  let orgInn="",kpp="",ogrn=null,regDate;
  if(usesInn12){
    do{orgInn=genInn12();}while(!validInn12(orgInn));
  }else{
    do{orgInn=inn10R(region);}while(!validInn10(orgInn));
  }
  if(supportsKpp){
    do{kpp=kppR(region);}while(!validKpp(kpp));
  }
  if(supportsOgrn){
    if(type==="juristic"){let og;do{og=ogrn13(year,region);}while(!validOgrn(og));ogrn=og;regDate=regDateFromOgrn(ogrn);}
    else{ogrn=ogrnip15(year,region);}
  }
  if(!regDate){const d=new Date();d.setFullYear(d.getFullYear()-r(1,15));d.setMonth(r(0,11));d.setDate(r(1,28));regDate=dateIso(d);}
  return {fullName:names.fullName,shortName:names.shortName,type,orgInn,kpp,address:randomAddr(),registrationDate:regDate,positionName:g(positions),departmentName:g(departments),...(ogrn?{ogrn}:{})};
}

function generateAllBundles(){
  return {person1:generatePerson(),person2:generatePerson(),org1:generateOrg("juristic"),org2:generateOrg("separate_juristic")};
}

function createDefaultEnv(id,label){

    baseUrl:"",

function normalizeOrgNameTemplates(templates){
  return {...DEFAULT_ORG_NAME_TEMPLATES,...(templates||{})};
}

function looksCorruptedText(value){
  const text=String(value||'').trim();
  if(!text)return true;
  if(text.includes('�'))return true;
  const clean=text.replace(/\{(brand|lastName|firstName|middleName)\}/g,'').trim();
  const questionCount=(text.match(/\?/g)||[]).length;
  const hasLetters=/[A-Za-zА-Яа-яЁё]/.test(clean);
  return questionCount>=3&&!hasLetters;
}

function sanitizeOrgNameBrands(brands){
  if(typeof brands!=='string')return DEFAULT_ORG_NAME_BRANDS.join('\n');
  const lines=brands.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(!lines.length)return DEFAULT_ORG_NAME_BRANDS.join('\n');
  const goodLines=lines.filter(line=>!looksCorruptedText(line));
  return (goodLines.length?goodLines:DEFAULT_ORG_NAME_BRANDS).join('\n');
}

function sanitizeOrgNameTemplates(templates){
  const merged=normalizeOrgNameTemplates(templates);
  const keys=['juristic','separate_juristic','individual_entrepreneur','farming','self_employed','not_defined'];
  const out={...DEFAULT_ORG_NAME_TEMPLATES};
  for(const key of keys){
    const raw=typeof merged[key]==='string'?merged[key].trim():'';
    out[key]=raw&&!looksCorruptedText(raw)?raw:DEFAULT_ORG_NAME_TEMPLATES[key];
  }
  return out;
}

function normalizeEnvConfig(env){
  const base=createDefaultEnv(env?.id||'env',env?.label||env?.id||'env');
  return {
    ...base,
    ...(env||{}),
    orgNameBrands:sanitizeOrgNameBrands(env?.orgNameBrands),
    orgNameTemplates:sanitizeOrgNameTemplates(env?.orgNameTemplates),
  };
}

function normalizeEnvList(envs){
  const list=Array.isArray(envs)&&envs.length?envs:[];
  return (list.length?list:[createDefaultEnv('dev','dev'),createDefaultEnv('stage','stage'),createDefaultEnv('prod','prod')]).map(normalizeEnvConfig);
}

function LogEntry({entry}){
  const ts=entry.ts?new Date(entry.ts).toLocaleTimeString('ru-RU',{hour12:false}):'';
  return <div className={`log-entry ${entry.level}`}><span className="log-ts">{ts}</span><span className="log-msg">{entry.message}</span></div>;
}
function PermBadge({val}){
  if(!val||val==='Нет') return <span className="badge badge-no">Нет</span>;
  if(val==='Да'||val==='Да (все)') return <span className="badge badge-yes">Да</span>;
  return <span className="badge badge-partial">{val}</span>;
}

function CopyBtn({text}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard.writeText(String(text)).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});};
  return <button className={`gen-copy ${copied?'copied':''}`} onClick={copy} title="Копировать">{copied?'✓':'⧉'}</button>;
}

// ─── RBAC PAGE ────────────────────────────────────────────────────────────
function RbacPage(){
  const [roleFilter,setRoleFilter]=useState('');
  const [resourceFilter,setResourceFilter]=useState('');
  const [searchFilter,setSearchFilter]=useState('');
  const filtered=RBAC.filter(row=>{
    if(resourceFilter&&row.resource!==resourceFilter)return false;
    if(searchFilter&&!row.action.toLowerCase().includes(searchFilter.toLowerCase()))return false;
    return true;
  });
  const resources=[...new Set(RBAC.map(r=>r.resource))];
  const roleIndices=roleFilter?[ROLES.indexOf(roleFilter)]:ROLES.map((_,i)=>i);

        <select className="form-input" value={roleFilter} onChange={e=>setRoleFilter(e.target.value)} style={{minWidth:160}}><option value="">Все роли</option>{ROLES.map(r=><option key={r} value={r}>{r}</option>)}</select>
        {(searchFilter||resourceFilter||roleFilter)&&<button className="btn btn-secondary" onClick={()=>{setSearchFilter('');setResourceFilter('');setRoleFilter('');}}>✕ Сбросить</button>}
      </div>
      <div className="rbac-wrap">
        <table className="rbac-table">
          <thead><tr><th>Ресурс</th><th>Действие</th>{roleIndices.map(i=><th key={i}>{ROLES[i]}</th>)}</tr></thead>
          <tbody>
            {filtered.map((row,idx)=>(
              <tr key={idx}>
                <td className="rbac-resource">{row.resource}</td>
                <td className="rbac-action">{row.action}</td>
                {roleIndices.map(i=><td key={i}><PermBadge val={row.perms[i]} /></td>)}

            ))}

        </table>
        {filtered.length===0&&<div style={{padding:'40px 0',textAlign:'center',color:'var(--text3)',fontSize:13}}>Ничего не найдено</div>}
      </div>
    </div>
  );
}

// Step status colours
const STEP_COLOR = { done:'var(--success)', error:'var(--error)', running:'var(--accent)' };

function ChainPage({ apiPostFn, bundles, addLog, waitForRunDone }){
  // chainState: { [chainId]: { status: 'idle'|'running'|'done'|'error', steps: {[i]: 'waiting'|'running'|'done'|'error'} } }
  const [chainState, setChainState] = useState({});

  const updStep = (chainId, i, st) =>
    setChainState(prev => ({ ...prev, [chainId]: { ...prev[chainId], steps: { ...prev[chainId]?.steps, [i]: st } } }));

  const runChain = async (chain) => {
    const cid = chain.id;
    if (chainState[cid]?.status === 'running') return;
    setChainState(prev => ({ ...prev, [cid]: { status: 'running', steps: {} } }));
    addLog({ level: 'info', message: `⛓ Цепочка [${chain.label}] запущена`, ts: new Date().toISOString() });

    for (let i = 0; i < chain.steps.length; i++) {
      const step = chain.steps[i];
      updStep(cid, i, 'running');
      addLog({ level: 'info', message: `  [${i+1}/${chain.steps.length}] ${step.label}…`, ts: new Date().toISOString() });
      try {
        const params = step.getParams(bundles);
        const started = await apiPostFn(`/api/run/${step.scenarioId}`, { params });
        const runId = started?.runId;
        if (!runId) throw new Error('runId не получен от backend');

        const done = await waitForRunDone(runId);
        if (done.status !== 'success') {
          const reason = done.error || `статус: ${done.status}`;
          throw new Error(reason);
        }

        updStep(cid, i, 'done');
        addLog({ level: 'success', message: `  ✓ ${step.label}`, ts: new Date().toISOString() });
      } catch (err) {
        updStep(cid, i, 'error');
        setChainState(prev => ({ ...prev, [cid]: { ...prev[cid], status: 'error' } }));
        addLog({ level: 'error', message: `  ✗ ${step.label}: ${err.message}`, ts: new Date().toISOString() });
        return;
      }
    }
    setChainState(prev => ({ ...prev, [cid]: { ...prev[cid], status: 'done' } }));
    addLog({ level: 'success', message: `⛓ Цепочка [${chain.label}] завершена`, ts: new Date().toISOString() });
  };

  const resetChain = (cid) => setChainState(prev => ({ ...prev, [cid]: { status: 'idle', steps: {} } }));

  const anyRunning = Object.values(chainState).some(c => c.status === 'running');

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title">Цепочки сценариев</div>
        <div className="panel-sub">Последовательный запуск нескольких действий одной кнопкой</div>
      </div>

      {!bundles && (
        <div className="card" style={{ borderColor: 'rgba(243,156,18,.35)', background: 'rgba(243,156,18,.04)' }}>
          <span style={{ fontSize: 12, color: 'var(--warn)' }}>
            ⚠ Сгенерируйте тестовые данные на вкладке «⚡ Данные» — цепочки берут параметры из бандлов автоматически
          </span>
        </div>
      )}

      {CHAINS.map(chain => {
        const cs = chainState[chain.id] || { status: 'idle', steps: {} };
        return (
          <div className="card" key={chain.id}>
            <div className="card-title">
              <span className="card-title-icon">⛓</span>
              {chain.label}
              <span style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
                { cs.status === 'done'    && <span className="pill pill-success">✓ Готово</span> }
                { cs.status === 'error'   && <span className="pill" style={{ background:'rgba(231,76,60,.12)',color:'var(--error)',border:'1px solid rgba(231,76,60,.3)' }}>✗ Ошибка</span> }
                { cs.status === 'running' && <span className="pill pill-info"><div className="spinner" style={{width:8,height:8,borderWidth:1.5}}/>&nbsp;Выполняется</span> }
                { (cs.status==='done'||cs.status==='error') && (
                  <button className="btn btn-secondary" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>resetChain(chain.id)}>↺ Сбросить</button>
                )}
              </span>
            </div>
            <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 14 }}>{chain.desc}</div>

            {/* Step list */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginBottom: 16 }}>
              {chain.steps.map((step, i) => {
                const st = cs.steps[i]; // 'running'|'done'|'error'|undefined
                const params = bundles ? step.getParams(bundles) : {};
                return (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'flex-start', gap: 12,
                    background: 'var(--surface2)', border: '1px solid var(--border)',
                    borderRadius: 8, padding: '10px 14px',
                    borderLeft: `3px solid ${st ? STEP_COLOR[st] : 'var(--border)'}`,
                  }}>
                    {/* Number / spinner / checkmark */}
                    <div style={{
                      width: 22, height: 22, borderRadius: '50%', flexShrink: 0, marginTop: 1,
                      background: st ? (st==='done'?'rgba(46,204,113,.15)':st==='error'?'rgba(231,76,60,.15)':'rgba(79,143,255,.15)') : 'var(--surface3)',
                      color: st ? STEP_COLOR[st] : 'var(--text3)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 11, fontWeight: 700, fontFamily: 'var(--mono)',
                    }}>
                      { st === 'running' ? <div className="spinner" style={{width:10,height:10,borderWidth:2,borderTopColor:'var(--accent)'}}/> :
                        st === 'done'    ? '✓' :
                        st === 'error'   ? '✗' : i+1 }
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)', marginBottom: 3 }}>{step.label}</div>
                      <div style={{ fontSize: 10.5, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>
                        {step.scenarioId}
                        { bundles && Object.keys(params).length > 0 && (
                          <span style={{ marginLeft: 10, color: 'var(--success)' }}>
                            · {Object.entries(params).slice(0,3).map(([k,v])=>`${k}=${String(v).slice(0,18)}`).join('  ')}
                            {Object.keys(params).length > 3 && ' …'}
                          </span>
                        )}
                        { !bundles && <span style={{ color: 'var(--warn)', marginLeft: 10 }}>· нет данных</span> }
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <button
              className="btn btn-primary"
              disabled={anyRunning}
              onClick={() => runChain(chain)}
            >
              { cs.status === 'running'
                ? <><div className="spinner"/>&nbsp;Выполняется…</>
                : `▶ Запустить цепочку (${chain.steps.length} шага)` }
            </button>
          </div>
        );
      })}

      {/* How to add chains */}
      <div className="card" style={{ borderColor: 'rgba(79,143,255,.25)', background: 'rgba(79,143,255,.03)' }}>
        <div className="card-title"><span className="card-title-icon">📖</span>Как добавить новую цепочку</div>
        <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.85, fontFamily: 'var(--mono)' }}>
          <div style={{ color: 'var(--text3)', marginBottom: 6, fontFamily: 'var(--sans)' }}>В файле <code>frontend/index.html</code> найдите массив <code>CHAINS</code> и добавьте объект:</div>
          <pre style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 7, padding: 12, fontSize: 11, overflowX: 'auto', color: 'var(--text2)' }}>{`{
  id: 'my_chain',             // уникальный ID
  label: 'Моя цепочка',      // отображается в UI
  desc:  'Что делает',
  steps: [
    {
      scenarioId: 'user.block',  // ID backend-сценария
      label: 'Шаг 1',
      getParams: (bundles) => ({  // данные из бандлов
        login: bundles?.person1?.login,
      }),
    },
    // ... ещё шаги
  ]
}`}</pre>
        </div>
      </div>
    </div>
  );
}

// ─── RUN HISTORY ──────────────────────────────────────────────────────────
const LS_HISTORY = 'xidbox_qa_history';

function HistoryPage({ history, clearHistory }) {
  const [filter, setFilter] = useState('');
  const [envFilter, setEnvFilter] = useState('');

  const envs = [...new Set(history.map(h => h.env).filter(Boolean))];
  const filtered = history
    .filter(h => !filter || h.scenario.includes(filter))
    .filter(h => !envFilter || h.env === envFilter)
    .slice().reverse();

  const copyRow = (h) => {
    navigator.clipboard.writeText(JSON.stringify(h, null, 2));
  };

  return (
    <div className="panel">
      <div className="panel-header">
        <div className="panel-title">История запусков</div>
        <div className="panel-sub">Что запускалось, когда, на каком стенде и с какими данными</div>
      </div>

      <div className="filter-bar" style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
        <input className="form-input" placeholder="🔍 Фильтр по сценарию..." value={filter} onChange={e => setFilter(e.target.value)} style={{ minWidth: 220 }} />
        <select className="form-input" value={envFilter} onChange={e => setEnvFilter(e.target.value)} style={{ minWidth: 130 }}>
          <option value="">Все стенды</option>
          {envs.map(e => <option key={e} value={e}>{e}</option>)}
        </select>
        { (filter || envFilter) && <button className="btn btn-secondary" onClick={() => { setFilter(''); setEnvFilter(''); }}>✕ Сбросить</button> }
        <span style={{ fontSize: 11, color: 'var(--text3)', alignSelf: 'center', marginLeft: 'auto' }}>{filtered.length} записей</span>
        <button className="btn btn-secondary" style={{ fontSize: 11 }} onClick={clearHistory}>🗑 Очистить</button>
      </div>

      {filtered.length === 0 && (
        <div style={{ color: 'var(--text3)', fontSize: 13, padding: '32px 0', textAlign: 'center' }}>
          История пуста — запустите любой сценарий
        </div>
      )}

      {filtered.map((h, i) => (
        <div key={i} style={{
          background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 9,
          padding: '11px 16px', marginBottom: 9,
          borderLeft: `3px solid ${h.status==='success'?'var(--success)':h.status==='error'?'var(--error)':'var(--border)'}`,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--text3)', flexShrink: 0 }}>
              {new Date(h.ts).toLocaleString('ru-RU')}
            </span>
            <span style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--text)' }}>{h.scenario}</span>
            { h.env && <span className="pill pill-info" style={{ fontSize: 10 }}>{h.env}</span> }
            { h.status === 'success' && <span className="pill pill-success" style={{ fontSize: 10 }}>✓ OK</span> }
            { h.status === 'error'   && <span className="pill" style={{ background:'rgba(231,76,60,.12)',color:'var(--error)',border:'1px solid rgba(231,76,60,.3)',fontSize:10 }}>✗ Ошибка</span> }
            { h.status === 'stopped' && <span className="pill" style={{ background:'rgba(243,156,18,.14)',color:'var(--warn)',border:'1px solid rgba(243,156,18,.35)',fontSize:10 }}>■ Остановлено</span> }
            { h.chain && <span className="pill pill-info" style={{ fontSize: 10 }}>⛓ {h.chain}</span> }
            <button
              onClick={() => copyRow(h)}
              style={{ marginLeft: 'auto', background: 'none', border: '1px solid var(--border)', borderRadius: 5, color: 'var(--text3)', cursor: 'pointer', fontSize: 11, padding: '2px 8px' }}
              title="Скопировать JSON"
            >⧉ JSON</button>
          </div>
          {/* Params row — hide password */}
          { h.params && Object.keys(h.params).length > 0 && (
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {Object.entries(h.params)
                .filter(([k]) => k !== 'password')
                .map(([k, v]) => (
                  <span key={k} style={{
                    background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 4,
                    padding: '1.5px 7px', fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--text3)',
                    whiteSpace: 'nowrap',
                  }}>
                    <span style={{ color: 'var(--text2)' }}>{k}</span>=<span style={{ color: 'var(--accent)' }}>{String(v).slice(0, 30)}{String(v).length > 30 ? '…' : ''}</span>
                  </span>
                ))
              }
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

          ['backend/playwright/my_scenario.js', 'Файл с Playwright-логикой'],
          ['backend/routes/run.js → SCENARIOS', 'Регистрация сценария в роутере'],
          ['frontend/index.html → AUTO_MAP', 'Автоподстановка данных в форму (если нужна)'],
          ['frontend/index.html → CHAINS', 'Добавление в цепочку (если нужно)'],
          ['frontend/index.html → <form>', 'Новая форма в нужном разделе (если нужен отдельный UI)'],
        ].map(([file, desc], i) => (
          <div key={i} style={{ display: 'flex', gap: 10, padding: '7px 0', borderBottom: i < 4 ? '1px solid var(--border)' : 'none' }}>
            <span style={{ color: 'var(--success)', fontSize: 13 }}>□</span>
            <div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--accent)' }}>{file}</div>
              <div style={{ fontSize: 11.5, color: 'var(--text3)', marginTop: 1 }}>{desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────


function App(){
  const [tab,setTab]=useState('orgs');
  const [logs,setLogs]=useState([]);
  const [running,setRunning]=useState(null);
  const [activeRunId,setActiveRunId]=useState(null);
  const [wsConnected,setWsConnected]=useState(false);
  const [envs,setEnvs]=useState(()=>normalizeEnvList(lsGet(LS_ENVS,DEFAULT_ENVS)));
  const [activeEnvId,setActiveEnvId]=useState(()=>localStorage.getItem(LS_ENV_ID)||'dev');
  const [prefill,setPrefill]=useState(null);
  const [history,setHistory]=useState(()=>lsGet(LS_HISTORY,[]));
  const [logHeight,setLogHeight]=useState(()=>{const v=Number(localStorage.getItem(LS_LOG_HEIGHT));return Number.isFinite(v)&&v>=140&&v<=900?v:220;});
  // bundles lifted to App so chains + pages share same data
  const [bundles,setBundles]=useState(()=>lsGet('xidbox_qa_bundles',null));
  const logBodyRef=useRef(null);
  const wsRef=useRef(null);
  const runMetaRef=useRef({});
  const doneWaitersRef=useRef(new Map());

  const activeEnv=envs.find(e=>e.id===activeEnvId)||envs[0]||{};

  useEffect(()=>{
    let cancelled=false;
    apiGet('/api/settings').then((data)=>{
      if(cancelled||!data||typeof data!=='object')return;
      if(Array.isArray(data.envs)&&data.envs.length){
        const loadedEnvs=normalizeEnvList(data.envs);
        const candidate=typeof data.activeEnvId==='string'&&data.activeEnvId?data.activeEnvId:(loadedEnvs[0]?.id||'dev');
        const resolvedActiveId=loadedEnvs.some(e=>e.id===candidate)?candidate:loadedEnvs[0].id;
        setEnvs(loadedEnvs);
        lsSet(LS_ENVS,loadedEnvs);
        setActiveEnvId(resolvedActiveId);
        lsSet(LS_ENV_ID,resolvedActiveId);
        const migrated = JSON.stringify(loadedEnvs)!==JSON.stringify(data.envs) || resolvedActiveId!==data.activeEnvId;
        if(migrated){apiPost('/api/settings',{envs:loadedEnvs,activeEnvId:resolvedActiveId}).catch(()=>{});}
        return;
      }
      if(typeof data.activeEnvId==='string'&&data.activeEnvId){
        setActiveEnvId(prev=>{
          const resolved=envs.some(e=>e.id===data.activeEnvId)?data.activeEnvId:prev;
          lsSet(LS_ENV_ID,resolved);
          return resolved;
        });
      }
    }).catch(()=>{});
    return ()=>{cancelled=true;};
  },[]);

  useEffect(()=>{
    if(activeEnv.baseUrl){
      apiPost('/api/config',{baseUrl:activeEnv.baseUrl,login:activeEnv.login,password:activeEnv.password,organizationApiUrl:activeEnv.organizationApiUrl||''}).catch(()=>{});
    }
  },[activeEnvId,envs]);

  useEffect(()=>{
    function connect(){
      const ws=new WebSocket(WS_BASE);
      wsRef.current=ws;
      ws.onopen=()=>setWsConnected(true);
      ws.onclose=()=>{setWsConnected(false);setTimeout(connect,3000);};
      ws.onmessage=(ev)=>{
        const msg=JSON.parse(ev.data);
        if(msg.type==='log'){setLogs(prev=>[...prev.slice(-600),{level:msg.level,message:msg.message,ts:msg.ts}]);}
        if(msg.type==='done'){
          const waiter = doneWaitersRef.current.get(msg.runId);
          if (waiter) {
            clearTimeout(waiter.timer);
            waiter.resolve(msg);
            doneWaitersRef.current.delete(msg.runId);
          }

          setRunning(null);
          setActiveRunId(null);
          const meta = runMetaRef.current[msg.runId];
          if (meta) {
            const status = msg.status === 'success' ? 'success' : (msg.status === 'stopped' ? 'stopped' : 'error');
            addHistory(meta.scenario, meta.params, status);
            delete runMetaRef.current[msg.runId];
          }
        }
      };
    }
    connect();
    return()=>wsRef.current?.close();
  },[]);

  useEffect(()=>{if(logBodyRef.current)logBodyRef.current.scrollTop=logBodyRef.current.scrollHeight;},[logs]);

  const addLog=(entry)=>setLogs(prev=>[...prev.slice(-600),entry]);

  const clampLogHeight=(value)=>{const max=Math.max(220,Math.floor(window.innerHeight*0.85));return Math.min(max,Math.max(140,Math.floor(value)));};
  const setAndSaveLogHeight=(value)=>{const next=clampLogHeight(value);setLogHeight(next);lsSet(LS_LOG_HEIGHT,next);};
  const startLogResize=(ev)=>{
    ev.preventDefault();
    const startY=ev.clientY;
    const startHeight=logHeight;
    const prevUserSelect=document.body.style.userSelect;
    const prevCursor=document.body.style.cursor;
    document.body.style.userSelect='none';
    document.body.style.cursor='ns-resize';
    let latestHeight=startHeight;
    const onMove=(moveEv)=>{
      const delta=startY-moveEv.clientY;
      latestHeight=clampLogHeight(startHeight+delta);
      setLogHeight(latestHeight);
    };
    const onUp=()=>{
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      document.body.style.userSelect=prevUserSelect;
      document.body.style.cursor=prevCursor;
      lsSet(LS_LOG_HEIGHT,latestHeight);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };

  const addHistory=(scenario,params,status)=>{
    const entry={scenario,params,status,env:activeEnv.label||activeEnvId,ts:new Date().toISOString()};
    setHistory(prev=>{const upd=[...prev.slice(-499),entry];lsSet(LS_HISTORY,upd);return upd;});
  };

  const waitForRunDone=(runId, timeoutMs=180000)=>{
    return new Promise((resolve, reject)=>{
      const timer = setTimeout(()=>{
        doneWaitersRef.current.delete(runId);
        reject(new Error(`Таймаут ожидания завершения runId=${runId}`));
      }, timeoutMs);
      doneWaitersRef.current.set(runId, { resolve, reject, timer });
    });
  };

  const runScenario=async(scenario,params)=>{
    if(running)return null;
    setRunning(scenario);
    addLog({level:'info',message:`─── Старт: ${scenario} [${activeEnv.label||activeEnvId}] ───`,ts:new Date().toISOString()});
    try{
      const resp = await apiPost(`/api/run/${scenario}`,{ params });
      if(resp?.runId){
        setActiveRunId(resp.runId);
        runMetaRef.current[resp.runId] = { scenario, params };
        const done = await waitForRunDone(resp.runId);
        return done;
      }
      return null;
    }
    catch(err){
      addLog({level:'error',message:`Ошибка: ${err.message}`,ts:new Date().toISOString()});
      addHistory(scenario,params,'error');
      setRunning(null);
      setActiveRunId(null);
      return null;
    }
  };

  const stopScenario=async()=>{
    if(!activeRunId)return;
    try{
      await apiPost(`/api/run/stop/${activeRunId}`,{});
      addLog({level:'warn',message:`Запрошена остановка runId=${activeRunId}`,ts:new Date().toISOString()});
    }
    catch(err){
      addLog({level:'error',message:`Не удалось остановить: ${err.message}`,ts:new Date().toISOString()});
    }
  };

  const handleUseInForm=(target,data)=>{
    setPrefill({target,data,ts:Date.now()});
    if(target==='user_create')setTab('users');
    if(target==='org_create')setTab('orgs');
  };

  // Menu visibility — persisted in localStorage
  const [hiddenTabs, setHiddenTabs] = useState(() => lsGet('xidbox_hidden_tabs', []));
  const toggleHideTab = (id) => {
    setHiddenTabs(prev => {
      const upd = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      lsSet('xidbox_hidden_tabs', upd);
      return upd;
    });
  };

  const ALL_TABS = [
    { id:'orgs',     ico:'🏢', label:'Организации',    section:'Основное' },
    { id:'users',    ico:'👤', label:'Пользователи',   section:'Основное' },
    { id:'profiles', ico:'🎭', label:'Профили',        section:'Основное' },
    { id:'tickets',  ico:'📋', label:'Заявки',         section:'Основное' },
    { id:'chains',   ico:'⛓', label:'Цепочки',        section:'Автоматизация' },
    { id:'datagen',  ico:'⚡', label:'Генератор данных',section:'Автоматизация' },
    { id:'history',  ico:'🕓', label:'История запусков',section:'Анализ', badge: history.length||null },
    { id:'rbac',     ico:'🔐', label:'Матрица прав',   section:'Анализ' },
    { id:'guide',    ico:'📖', label:'Добавить сценарий',section:'Помощь' },
    { id:'settings', ico:'⚙️', label:'Настройки',      section:'Помощь' },
  ];

  const visibleTabs = ALL_TABS.filter(t => !hiddenTabs.includes(t.id));
  // If current tab got hidden — switch to first visible
  useEffect(() => {
    if (hiddenTabs.includes(tab)) setTab(visibleTabs[0]?.id || 'orgs');
  }, [hiddenTabs]);

  // Group by section
  const sections = [...new Set(ALL_TABS.map(t => t.section))];

  return (
    <React.Fragment>
      {/* TOPBAR */}
      <div className="topbar">
        <div className="topbar-logo">MY QA Tools <span style={{fontSize:'11px', opacity:0.5, fontWeight:'normal', letterSpacing:'0.05em'}}>v0.00.01</span></div>
        <div className="topbar-status">
          <div className={`status-dot ${wsConnected?'connected':'error'}`} />
          <span>{wsConnected ? 'backend online' : 'backend offline'}</span>
          {envs.map(e=>(
            <button key={e.id} className={`env-pill ${e.label} ${activeEnvId===e.id?'active':''}`}
              onClick={()=>{setActiveEnvId(e.id);lsSet(LS_ENV_ID,e.id);}}>
              {e.label}
            </button>
          ))}
          {running && <span className="pill pill-info"><div className="spinner" style={{width:8,height:8,borderWidth:1.5}}/>&nbsp;{running}</span>}
        </div>
      </div>

      <div className="main">
        {/* SIDEBAR */}
        <div className="sidebar">
          {sections.map(section => {
            const items = visibleTabs.filter(t => t.section === section);
            if (!items.length) return null;
            return (
              <div className="sidebar-section" key={section}>
                <div className="sidebar-label">{section}</div>
                {items.map(t => (
                  <button key={t.id} className={`sidebar-item ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
                    <span className="sidebar-icon">{t.ico}</span>
                    {t.label}
                    {t.badge ? <span className="sidebar-badge">{t.badge}</span> : null}
                  </button>
                ))}
              </div>
            );
          })}
          {/* Settings always visible at bottom */}
          {hiddenTabs.includes('settings') && (
            <div className="sidebar-footer">
              <button className="sidebar-item" onClick={()=>setTab('settings')}>
                <span className="sidebar-icon">⚙️</span>Настройки
              </button>
            </div>
          )}
        </div>

        {/* CONTENT */}
        <div className="content">
          {tab==='orgs'     &&<OrgsPage     runScenario={runScenario} running={running} prefill={prefill} />}
          {tab==='users'    &&<UsersPage    runScenario={runScenario} running={running} prefill={prefill} />}
          {tab==='profiles' &&<ProfilesPage runScenario={runScenario} running={running} />}
          {tab==='tickets'  &&<TicketsPage  runScenario={runScenario} running={running} />}
          {tab==='chains'   &&<ChainPage    apiPostFn={apiPost} bundles={bundles} addLog={addLog} waitForRunDone={waitForRunDone} />}
          {tab==='rbac'     &&<RbacPage />}
          {tab==='datagen'  &&<DataGenPage  onUseInForm={handleUseInForm} bundles={bundles} setBundles={setBundles} />}
          {tab==='history'  &&<HistoryPage  history={history} clearHistory={()=>{setHistory([]);lsSet(LS_HISTORY,[]);}} />}
          {tab==='guide'    &&<ScenarioGuidePage />}
          {tab==='settings' &&<SettingsPage envs={envs} setEnvs={setEnvs} activeEnvId={activeEnvId} setActiveEnvId={setActiveEnvId} hiddenTabs={hiddenTabs} toggleHideTab={toggleHideTab} allTabs={ALL_TABS} />}

          <div className="log-pane" style={{height:logHeight}}>
            <div className="log-resizer" onMouseDown={startLogResize} title="Потяните, чтобы изменить высоту лога" />
            <div className="log-header">
              <span className="log-title">Лог выполнения</span>
              <span className="log-count">{logs.length}</span>
              {running&&<span className="pill pill-info" style={{fontSize:10}}><div className="spinner" style={{width:8,height:8,borderWidth:1.5}}/>&nbsp;работает</span>}
              {running&&<button className="log-clear" onClick={stopScenario} title="Остановить выполнение">стоп</button>}
              <button className="log-clear" onClick={()=>setAndSaveLogHeight(logHeight+80)} title="Увеличить высоту">+</button>
              <button className="log-clear" onClick={()=>setAndSaveLogHeight(logHeight-80)} title="Уменьшить высоту">-</button>
              <button className="log-clear" onClick={()=>setAndSaveLogHeight(220)} title="Сбросить высоту">100%</button>
              <button className="log-clear" onClick={()=>setLogs([])}>очистить</button>
            </div>
            <div className="log-body" ref={logBodyRef}>
              {logs.length===0&&<div style={{color:'var(--text3)',fontSize:12,padding:'8px 0'}}>Лог выполнения сценариев…</div>}
              {logs.map((entry,i)=><LogEntry key={i} entry={entry} />)}
            </div>
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
